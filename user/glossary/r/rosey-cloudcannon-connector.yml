_schema: default
glossary_term_name: Rosey CloudCannon Connector
term_description: >-
  The Rosey CloudCannon Connector is an optional package that connects Rosey's
  translation data to the CloudCannon *Visual Editor*, allowing editors to
  translate content inline without leaving the *Visual Editor*. It extends
  Rosey's build-time translation process with live editing support.
documentation_link: /documentation/developer-guides/add-internationalization-with-rosey/what-is-the-rosey-cloudcannon-connector/
