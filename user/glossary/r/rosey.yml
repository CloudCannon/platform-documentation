glossary_term_name: Rosey
term_description: >-
  Rosey is a tool for internationalization (i18n) that helps create multilingual static websites by managing translations and generating localized versions of content. Rosey integrates with CloudCannon for multilingual site management.
documentation_link: /documentation/developer-guides/add-internationalization-with-rosey/what-is-rosey/
