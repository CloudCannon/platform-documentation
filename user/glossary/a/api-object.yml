_schema: default
glossary_term_name: API Object
term_description: >-
  An API object is an object that exposes an API's methods, so you can work with a service or system in code. In CloudCannon, the *Visual Editor API* provides an *API Object* as its entry point: call `useVersion()` on `window.CloudCannonAPI` to get it, then use its methods to access files, *Collections*, and *Datasets*, read and write content, listen for changes, and build custom integrations in the *Visual Editor*.
documentation_link: /documentation/developer-articles/initialize-the-visual-editor-api/
