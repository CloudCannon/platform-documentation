_schema: default
glossary_term_name: Add-on
term_description: >-
  An add-on is extra capacity (users, bandwidth, custom domains, or build time)
  purchased in bundles to extend a plan's included limits. When overages are
  enabled, CloudCannon automatically purchases add-on bundles when your
  *Organization* exceeds its plan limits.
documentation_link: /documentation/user-articles/what-are-add-ons/
