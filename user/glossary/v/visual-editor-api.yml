glossary_term_name: Visual Editor API
term_description: >-
  CloudCannon's Visual Editor API is a public JavaScript API for building custom integrations with the *Visual Editor*. It lets you run your own code inside the *Visual Editor* to read and write content, listen for changes, and upload files using code running inside your website files.
documentation_link: /documentation/developer-articles/what-is-the-visual-editor-api/
