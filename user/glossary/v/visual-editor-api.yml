glossary_term_name: Visual Editor API
term_description: >-
  CloudCannon's Visual Editor API is a public JavaScript API for building custom integrations with the *Visual Editor*. It lets developers run their own code inside the *Visual Editor* to read and write content, listen for changes, upload files, and build custom editing interfaces — all from code running inside their website files.
documentation_link: /documentation/developer-articles/what-is-the-visual-editor-api/
