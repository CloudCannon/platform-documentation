_schema: default
glossary_term_name: Trial
term_description: >-
  A trial is a 21-day free period that gives an *Organization* access to
  Standard plan features without requiring a payment method. You can start a
  trial from the plan selection page if your *Organization* is on the Personal
  plan.
documentation_link: /documentation/user-articles/what-is-cloudcannons-free-trial/
