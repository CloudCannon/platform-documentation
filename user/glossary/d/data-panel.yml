glossary_term_name: Data Panel
term_description: >-
  A Data Panel is a panel of *Inputs* for editing a focused scope of structured data, such as image details, link attributes, or *Site* configuration. Data Panels appear in several places across CloudCannon — in the *Visual Editor*, in the *Content Editor* when you edit a snippet, image, or link, and in *Configuration Mode*, such as the *Edit Advanced* panel. Developers can also build custom Data Panels with full *Input* support using the *Visual Editor API*.
documentation_link: /documentation/user-articles/what-is-the-visual-editor/
