_schema: default
glossary_term_name: Domains Browser
term_description: >-
  CloudCannon's interface for managing the *Custom Domains* connected to your *Organization*. The *Domains Browser* allows you to connect new domains and open a *Domain* to manage its subdomains, DNS records, SSL certificates, and minimum TLS version. You can access the *Domains Browser* from the *App Sidebar*.
documentation_link: /documentation/developer-articles/what-is-a-custom-domain/
