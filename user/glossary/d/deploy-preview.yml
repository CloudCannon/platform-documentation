_schema: default
glossary_term_name: Deploy Preview
term_description: >-
  A Deploy Preview is a temporary *Site* that CloudCannon automatically creates when a *Pull Request* is opened in your *Git Repository*. Each *Deploy Preview* has its own build pipeline, *Testing Domain*, and editing experience, allowing your team to review and edit content in CloudCannon before the *Pull Request* is merged. CloudCannon can also delete *Deploy Previews* automatically when a *Pull Request* is closed or merged.
documentation_link: /documentation/developer-articles/use-pull-requests-to-trigger-site-creation-and-deletion/
