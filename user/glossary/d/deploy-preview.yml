glossary_term_name: Deploy Preview
term_description: >-
  *Deploy Previews* are a set of automations that CloudCannon can run whenever a *Pull Request* is opened, closed, or updated in your *Git Repository*. When enabled, CloudCannon can post a comment on each *Pull Request* with details of any connected *Sites*, and automatically create and delete a *Site* for each *Pull Request*. This lets your team review and edit changes in CloudCannon before a *Pull Request* is merged.
documentation_link: /documentation/developer-articles/what-are-deploy-previews/
