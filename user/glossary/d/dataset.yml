_schema: default
glossary_term_name: Dataset
term_description: >-
  A structured data file or folder defined under `data_config` in your *CloudCannon Configuration File*. *Datasets* are used to store reusable data such as navigation links, locale strings, or site settings, and can be accessed and updated through CloudCannon's editing interfaces.
documentation_link: /documentation/developer-articles/define-your-data/
