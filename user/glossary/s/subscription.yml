_schema: default
glossary_term_name: Subscription
term_description: >-
  A subscription is a billing plan associated with an *Organization* that
  determines available features, resource limits, and billing period. Members of
  the *Owners* or *Billing* *Permission Groups* can manage the *Subscription*
  through *Organization Settings*.
documentation_link: /documentation/user-articles/what-is-a-cloudcannon-subscription/
