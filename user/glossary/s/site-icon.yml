_schema: default
glossary_term_name: Site Icon
term_description: >-
  A PNG image file (`siteicon.png`) at the root of your repository that
  CloudCannon uses to identify your *Site* across the interface. Your *Site
  Icon* appears in the *Site Header*, *Sites Browser*, *Project* page, and
  other areas of the app.
documentation_link: /documentation/developer-articles/what-is-a-site-icon/
