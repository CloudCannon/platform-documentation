_schema: default
glossary_term_name: Publishing Workflow
term_description: >-
  A workflow that controls how changes move between multiple *Sites* in a *Project*. Branching an existing *Site* allows *Team Members* to draft changes on an independent, identical copy, then publish those changes back when they are ready. Common workflows move changes from draft *Sites* to a Staging *Site* to a Production *Site*, protecting each upstream *Site* from changes until they are ready.
documentation_link: /documentation/user-articles/what-is-publishing/
