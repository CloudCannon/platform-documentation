glossary_term_name: Localization
term_description: >-
  Localization is the process of adapting a website for a specific language, region, or locale. Also known as l10n, localization involves translating text, reformatting dates, and adjusting content for a particular audience. Localization is applied after internationalization (i18n), which structures the site to support it.
documentation_link: /documentation/developer-articles/what-is-internationalization/
