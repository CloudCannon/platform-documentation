guide_sections:
  type: array
  cascade: true
guide_sections[*]:
  type: object
  options: 
    preview:
      text:
        - key: section_title
        - Guide Section
guide_sections[*].grid_size:
  type: choice
  options:
    allow_empty: true
    values:
      - value: sm
        text: Small
        icon: tile_small
      - value: lg
        text: Large
        icon: tile_large
    value_key: value
    preview:
      text:
        - key: text
      icon:
        - key: icon
    required: true
  comment: How large should the guide card be?
  cascade: true
guide_sections[*].items:
  type: array
  options:
    required: true
  label: Guides
  comment: Add guides to this section.
  cascade: true
